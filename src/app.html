<!DOCTYPE html>
<html lang="tr">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<title>MertNews</title>

		<meta name="description" content="MertNews — Türkiye ve dünyadan anlık haberler, finans verileri ve daha fazlası." />
		<meta name="author" content="Tahsin Mert" />
		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="MertNews" />
		<meta property="og:title" content="MertNews" />
		<meta property="og:description" content="Türkiye ve dünyadan anlık haberler, finans verileri ve daha fazlası." />
		<meta property="og:image" content="%sveltekit.assets%/icon-512.png" />
		<meta name="twitter:card" content="summary_large_image" />

		<!-- Favicon & Apple Touch Icon -->
		<link rel="icon" type="image/png" sizes="32x32" href="%sveltekit.assets%/favicon-32x32.png" />
		<link rel="icon" type="image/png" sizes="16x16" href="%sveltekit.assets%/favicon-16x16.png" />
		<link rel="apple-touch-icon" sizes="180x180" href="%sveltekit.assets%/apple-touch-icon.png" />
		<link rel="manifest" href="%sveltekit.assets%/site.webmanifest" />
		<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />

		<!-- PWA: iOS Add to Home Screen -->
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<meta name="apple-mobile-web-app-title" content="MertNews" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="format-detection" content="telephone=no" />
		%sveltekit.head%
		<style>
			html, body {
				overflow-x: hidden;
				overscroll-behavior-x: none;
				-webkit-text-size-adjust: 100%;
			}
			body {
				background-color: #fff;
				margin: 0;
				-webkit-font-smoothing: antialiased;
			}
			@media (prefers-color-scheme: dark) {
				body { background-color: #000; }
			}
		</style>
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
